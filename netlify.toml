[build]
  publish = "public"
  command = "npm install"
  functions = "netlify/functions"

[functions]
  included_files = ["products.json", "product_export (1).json"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
